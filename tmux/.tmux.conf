# Set prefix to Ctrl+Space (easier than Ctrl+B)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Mouse support
set -g mouse on

# Start windows and panes at 1 not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback
set -g history-limit 10000

# Split panes with | and -
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Switch panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# True colour
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Status bar
set -g status-position bottom
set -g status-style 'bg=#1a1b26 fg=#7aa2f7'
set -g status-left '#[fg=#1a1b26,bg=#7aa2f7,bold] #S '
set -g status-right '#[fg=#565f89] %H:%M %d %b '
set -g window-status-current-format '#[fg=#1a1b26,bg=#7aa2f7] #I #W '
set -g window-status-format '#[fg=#565f89] #I #W '

# Small escape delay. 0 makes tmux give up mid-read on WezTerm's terminal
# query replies, spilling them into the pane as garbage; 10ms fixes that and
# is imperceptible for <Esc> in vim.
set -sg escape-time 10
